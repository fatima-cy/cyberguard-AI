name: Deploy Web to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'packages/web/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # VITE_API_BASE_URL is baked into the bundle at build time (see
      # client.ts's apiUrl() helper) — this must point at the real deployed
      # API, since there's no dev-server proxy once this is a static build.
      - name: Build shared + web
        env:
          VITE_API_BASE_URL: https://cs-staging-api-ooraxwwtsrgie.azurewebsites.net
        run: npx turbo run build --filter=@cyberguard/web...

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: packages/web/dist
          skip_app_build: true
